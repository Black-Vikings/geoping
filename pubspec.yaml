name: geopping
description: Comparte tu ubicación en tiempo real con tu familia con un solo toque.
publish_to: 'none'
version: 1.1.1+5

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_messaging: ^16.2.2

  # State management & navigation
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Location
  geolocator: ^14.0.2

  # Map
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # QR
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # Permissions & storage
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.2.0

  # UI
  google_fonts: ^6.2.1
  intl_phone_field: ^3.2.0
  url_launcher: ^6.3.2
  http: ^1.2.0
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#3DBCBC"
  image: assets/icon.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/icon.png
    color: "#3DBCBC"
    icon_background_color: "#3DBCBC"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
